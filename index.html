<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GD Macros & Files</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #121212; /* Dark mode for GD vibes */
            color: white;
            display: flex;
            justify-content: center;
            padding: 40px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 { text-align: center; color: #4af6ff; }
        .download-list {
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
        }
        .item:last-child { border-bottom: none; }
        .file-info b { display: block; color: #fff; }
        .file-info span { font-size: 0.8rem; color: #888; }
        .dl-btn {
            background: #4af6ff;
            color: #000;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .dl-btn:hover { background: #38c5cc; }
    </style>
</head>
<body>

    <div class="container">
        <h1>My GD Downloads</h1>
        <div class="download-list">
            
            <div class="item">
                <div class="file-info">
                    <b>Bloodlust_Macro.gmd</b>
                    <span>GD Macro File</span>
                </div>
                <a href="Bloodlust_Macro.gmd" download class="dl-btn">Download</a>
            </div>

            <div class="item">
                <div class="file-info">
                    <b>Cataclysm_Straightfly.json</b>
                    <span>Mega Hack Macro</span>
                </div>
                <a href="Cataclysm_Straightfly.json" download class="dl-btn">Download</a>
            </div>

            <div class="item">
                <div class="file-info">
                    <b>Resources.zip</b>
                    <span>Texture Pack / Sounds</span>
                </div>
                <a href="Resources.zip" download class="dl-btn">Download</a>
            </div>

        </div>
    </div>

</body>
</html>
